<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Analysis Dashboard</title>
    <style>
        :root {
            --primary-color: #1f2933;
            --accent-color: #2f80ed;
            --surface-color: rgba(255, 255, 255, 0.96);
            --border-color: rgba(31, 41, 51, 0.12);
            --muted-color: #52606d;
            --danger-bg: #fdecec;
            --danger-fg: #a61b1b;
            --success-bg: #ecfdf3;
            --success-fg: #146c43;
        }

        body {
            background: linear-gradient(180deg, #eef4fb 0%, #dce7f4 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 12px;
            color: var(--primary-color);
        }

        .container-main {
            max-width: 520px;
            margin: 0 auto;
        }

        .header {
            background: var(--surface-color);
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 12px 32px rgba(31, 41, 51, 0.12);
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            color: #52606d;
            font-size: 0.9rem;
            margin: 0;
        }

        .trader-toggle {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 16px;
            padding: 14px;
            border: 1px solid rgba(47, 128, 237, 0.14);
            border-radius: 10px;
            background: #f8fbff;
        }

        .control-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-row label,
        .status-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--muted-color);
        }

        .trader-toggle small {
            color: #7b8794;
            min-height: 1em;
        }

        .compact-input-group {
            display: flex;
            gap: 8px;
        }

        .compact-input-group .form-control {
            min-width: 0;
        }

        .btn-primary {
            background: var(--accent-color);
            border: none;
            padding: 8px 14px;
            font-weight: 600;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #2569c8;
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        .form-control,
        .form-select {
            border-radius: 6px;
            border: 1px solid #ddd;
            padding: 8px 12px;
            width: 100%;
            font: inherit;
            background: #fff;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
            outline: none;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .toggle-row input {
            width: 2.75rem;
            height: 1.4rem;
            margin: 0;
            accent-color: var(--accent-color);
        }

        .alert {
            border-radius: 8px;
            border: none;
            display: none;
            margin-top: 12px;
            padding: 10px 12px;
            font-size: 0.92rem;
        }

        .alert.active {
            display: block;
        }

        .alert-danger {
            background: var(--danger-bg);
            color: var(--danger-fg);
        }

        .alert-success {
            background: var(--success-bg);
            color: var(--success-fg);
        }

        @media (max-width: 768px) {
            .header {
                padding: 16px;
            }

            body {
                padding: 10px;
            }

            .compact-input-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container-main">
        <div class="header">
            <div>
                <h1>Trader Controls</h1>
                <p>Compact controls for trader enablement, volatility tuning, and BTC MACD tilt.</p>
            </div>

            <div class="trader-toggle">
                <div class="control-row">
                    <label class="toggle-row" for="traderEnabledSwitch">
                        <input type="checkbox" role="switch" id="traderEnabledSwitch">
                        <span>Trader enabled</span>
                    </label>
                    <small id="traderEnabledHint">Loading…</small>
                </div>

                <div class="control-row">
                    <label for="traderVolMultInput">Vol multiplier</label>
                    <div class="compact-input-group">
                        <input type="number" class="form-control" id="traderVolMultInput" step="0.1" min="0"
                            placeholder="(unset)">
                        <button class="btn btn-primary" type="button" id="traderVolMultApplyBtn">Apply</button>
                    </div>
                    <small id="traderVolMultHint"></small>
                </div>

                <div class="control-row">
                    <label for="traderVolInterceptInput">Vol intercept</label>
                    <div class="compact-input-group">
                        <input type="number" class="form-control" id="traderVolInterceptInput" step="0.001" min="0"
                            placeholder="0.0">
                        <button class="btn btn-primary" type="button" id="traderVolInterceptApplyBtn">Apply</button>
                    </div>
                    <small id="traderVolInterceptHint"></small>
                </div>

                <div class="control-row">
                    <label for="traderMaxPositionInput">Max position</label>
                    <div class="compact-input-group">
                        <input type="number" class="form-control" id="traderMaxPositionInput" step="0.1" min="0"
                            placeholder="(unset)">
                        <button class="btn btn-primary" type="button" id="traderMaxPositionApplyBtn">Apply</button>
                    </div>
                    <small id="traderMaxPositionHint"></small>
                </div>

                <div class="control-row">
                    <label for="traderPositionSlopeInput">Vol slope</label>
                    <div class="compact-input-group">
                        <input type="number" class="form-control" id="traderPositionSlopeInput" step="0.1"
                            placeholder="(unset)">
                        <button class="btn btn-primary" type="button" id="traderPositionSlopeApplyBtn">Apply</button>
                    </div>
                    <small id="traderPositionSlopeHint"></small>
                </div>

                <div class="control-row">
                    <label for="traderBtcMacdCoeffInput">BTCUSDT MACD coeff</label>
                    <div class="compact-input-group">
                        <input type="number" class="form-control" id="traderBtcMacdCoeffInput" step="0.01"
                            placeholder="0.0">
                        <button class="btn btn-primary" type="button" id="traderBtcMacdCoeffApplyBtn">Apply</button>
                    </div>
                    <small id="traderBtcMacdCoeffHint"></small>
                </div>
            </div>

            <div class="alert alert-danger" id="errorAlert"></div>
            <div class="alert alert-success" id="successAlert"></div>
        </div>

        <!--
        Remaining dashboard components are intentionally disabled to keep this page compact:
        - err/log file selection
        - upload/paste analysis tools
        - stats, plots, and table preview
        - footer/navigation shortcuts
        -->
    </div>

    <script>
        // --- Trader enable/disable control ---
        const traderEnabledSwitch = document.getElementById('traderEnabledSwitch');
        const traderEnabledHint = document.getElementById('traderEnabledHint');
        const traderVolMultInput = document.getElementById('traderVolMultInput');
        const traderVolMultApplyBtn = document.getElementById('traderVolMultApplyBtn');
        const traderVolMultHint = document.getElementById('traderVolMultHint');
        const traderVolInterceptInput = document.getElementById('traderVolInterceptInput');
        const traderVolInterceptApplyBtn = document.getElementById('traderVolInterceptApplyBtn');
        const traderVolInterceptHint = document.getElementById('traderVolInterceptHint');

        const traderMaxPositionInput = document.getElementById('traderMaxPositionInput');
        const traderMaxPositionApplyBtn = document.getElementById('traderMaxPositionApplyBtn');
        const traderMaxPositionHint = document.getElementById('traderMaxPositionHint');

        const traderPositionSlopeInput = document.getElementById('traderPositionSlopeInput');
        const traderPositionSlopeApplyBtn = document.getElementById('traderPositionSlopeApplyBtn');
        const traderPositionSlopeHint = document.getElementById('traderPositionSlopeHint');
        const traderBtcMacdCoeffInput = document.getElementById('traderBtcMacdCoeffInput');
        const traderBtcMacdCoeffApplyBtn = document.getElementById('traderBtcMacdCoeffApplyBtn');
        const traderBtcMacdCoeffHint = document.getElementById('traderBtcMacdCoeffHint');

        async function refreshTraderState() {
            try {
                const r = await fetch('/api/trader/state', { method: 'GET' });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                traderEnabledSwitch.checked = !!data.enabled;
                traderEnabledHint.textContent = data.enabled ? 'Orders ON' : 'Orders OFF';

                const vm = (data.volMult === null || data.volMult === undefined) ? null : Number(data.volMult);
                if (vm !== null && Number.isFinite(vm) && vm > 0) {
                    traderVolMultHint.textContent = `Current volMult: ${vm}`;
                    if (!traderVolMultInput.value)
                        traderVolMultInput.value = String(vm);
                } else {
                    traderVolMultHint.textContent = 'Current volMult: (unset)';
                }

                const vi = (data.volIntercept === null || data.volIntercept === undefined) ? null : Number(data.volIntercept);
                if (vi !== null && Number.isFinite(vi)) {
                    traderVolInterceptHint.textContent = `Current volIntercept: ${vi}`;
                    if (!traderVolInterceptInput.value)
                        traderVolInterceptInput.value = String(vi);
                } else {
                    traderVolInterceptHint.textContent = 'Current volIntercept: (unavailable)';
                }

                const mp = (data.maxPosition === null || data.maxPosition === undefined) ? null : Number(data.maxPosition);
                if (mp !== null && Number.isFinite(mp) && mp > 0) {
                    traderMaxPositionHint.textContent = `Current maxPosition: ${mp}`;
                    if (!traderMaxPositionInput.value)
                        traderMaxPositionInput.value = String(mp);
                } else {
                    traderMaxPositionHint.textContent = 'Current maxPosition: (unset)';
                }

                const ps = (data.positionSlope === null || data.positionSlope === undefined) ? null : Number(data.positionSlope);
                if (ps !== null && Number.isFinite(ps)) {
                    traderPositionSlopeHint.textContent = `Current positionSlope: ${ps}`;
                    if (!traderPositionSlopeInput.value)
                        traderPositionSlopeInput.value = String(ps);
                } else {
                    traderPositionSlopeHint.textContent = 'Current positionSlope: (unset)';
                }

                const mc = (data.btcMacdCoeff === null || data.btcMacdCoeff === undefined) ? null : Number(data.btcMacdCoeff);
                if (mc !== null && Number.isFinite(mc)) {
                    traderBtcMacdCoeffHint.textContent = `Current BTC MACD coeff: ${mc}`;
                    if (!traderBtcMacdCoeffInput.value)
                        traderBtcMacdCoeffInput.value = String(mc);
                } else {
                    traderBtcMacdCoeffHint.textContent = 'Current BTC MACD coeff: (unset)';
                }
            } catch (e) {
                traderEnabledHint.textContent = `State unavailable (${e.message})`;
                traderVolMultHint.textContent = '';
                traderVolInterceptHint.textContent = '';
                traderMaxPositionHint.textContent = '';
                traderPositionSlopeHint.textContent = '';
                traderBtcMacdCoeffHint.textContent = '';
            }
        }

        traderEnabledSwitch.addEventListener('change', async () => {
            const enabled = traderEnabledSwitch.checked;
            traderEnabledHint.textContent = 'Updating…';
            try {
                const r = await fetch('/api/trader/state', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled })
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                traderEnabledSwitch.checked = !!data.enabled;
                traderEnabledHint.textContent = data.enabled ? 'Orders ON' : 'Orders OFF';
                showSuccess(data.enabled ? 'Trader enabled' : 'Trader disabled');
            } catch (e) {
                showError(`Failed to update trader state: ${e.message}`);
                await refreshTraderState();
            }
        });

        traderVolMultApplyBtn.addEventListener('click', async () => {
            const raw = (traderVolMultInput.value || '').trim();
            const volMult = raw ? Number(raw) : 0;
            if (!Number.isFinite(volMult) || volMult < 0) {
                showError('Invalid VolMult (must be >= 0)');
                return;
            }
            traderVolMultHint.textContent = 'Updating…';
            try {
                const r = await fetch('/api/trader/volmult', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ volMult })
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                const vm = (data.volMult === null || data.volMult === undefined) ? null : Number(data.volMult);
                if (vm !== null && Number.isFinite(vm) && vm > 0) {
                    traderVolMultHint.textContent = `Current volMult: ${vm}`;
                    showSuccess(`VolMult set to ${vm}`);
                } else {
                    traderVolMultHint.textContent = 'Current volMult: (unset)';
                    showSuccess('VolMult unset');
                }
            } catch (e) {
                showError(`Failed to update VolMult: ${e.message}`);
                await refreshTraderState();
            }
        });

        traderVolInterceptApplyBtn.addEventListener('click', async () => {
            const raw = (traderVolInterceptInput.value || '').trim();
            const volIntercept = raw ? Number(raw) : 0;
            if (!Number.isFinite(volIntercept) || volIntercept < 0) {
                showError('Invalid VolIntercept (must be >= 0)');
                return;
            }
            traderVolInterceptHint.textContent = 'Updating…';
            try {
                const r = await fetch('/api/trader/volintercept', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ volIntercept })
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                const vi = (data.volIntercept === null || data.volIntercept === undefined) ? null : Number(data.volIntercept);
                if (vi !== null && Number.isFinite(vi)) {
                    traderVolInterceptHint.textContent = `Current volIntercept: ${vi}`;
                    showSuccess(`VolIntercept set to ${vi}`);
                } else {
                    traderVolInterceptHint.textContent = 'Current volIntercept: (unavailable)';
                    showSuccess('VolIntercept updated');
                }
            } catch (e) {
                showError(`Failed to update VolIntercept: ${e.message}`);
                await refreshTraderState();
            }
        });

        traderMaxPositionApplyBtn.addEventListener('click', async () => {
            const raw = (traderMaxPositionInput.value || '').trim();
            const maxPosition = raw ? Number(raw) : 0;
            if (!Number.isFinite(maxPosition) || maxPosition < 0) {
                showError('Invalid maxPosition (must be >= 0)');
                return;
            }
            traderMaxPositionHint.textContent = 'Updating…';
            try {
                const r = await fetch('/api/trader/maxposition', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ maxPosition })
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                const mp = (data.maxPosition === null || data.maxPosition === undefined) ? null : Number(data.maxPosition);
                if (mp !== null && Number.isFinite(mp) && mp > 0) {
                    traderMaxPositionHint.textContent = `Current maxPosition: ${mp}`;
                    showSuccess(`MaxPosition set to ${mp}`);
                } else {
                    traderMaxPositionHint.textContent = 'Current maxPosition: (unset)';
                    showSuccess('MaxPosition unset');
                }
            } catch (e) {
                showError(`Failed to update MaxPosition: ${e.message}`);
                await refreshTraderState();
            }
        });

        traderVolInterceptApplyBtn.addEventListener('click', async () => {
            const raw = (traderVolInterceptInput.value || '').trim();
            const volIntercept = raw ? Number(raw) : 0;
            if (!Number.isFinite(volIntercept) || volIntercept < 0) {
                showError('Invalid VolIntercept (must be >= 0)');
                return;
            }
            traderVolInterceptHint.textContent = 'Updating…';
            try {
                const r = await fetch('/api/trader/volintercept', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ volIntercept })
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                const vi = (data.volIntercept === null || data.volIntercept === undefined) ? null : Number(data.volIntercept);
                if (vi !== null && Number.isFinite(vi)) {
                    traderVolInterceptHint.textContent = `Current volIntercept: ${vi}`;
                    showSuccess(`VolIntercept set to ${vi}`);
                } else {
                    traderVolInterceptHint.textContent = 'Current volIntercept: (unavailable)';
                    showSuccess('VolIntercept updated');
                }
            } catch (e) {
                showError(`Failed to update VolIntercept: ${e.message}`);
                await refreshTraderState();
            }
        });

        traderPositionSlopeApplyBtn.addEventListener('click', async () => {
            const raw = (traderPositionSlopeInput.value || '').trim();
            if (!raw) {
                showError('PositionSlope is required');
                return;
            }
            const positionSlope = Number(raw);
            if (!Number.isFinite(positionSlope)) {
                showError('Invalid PositionSlope');
                return;
            }
            traderPositionSlopeHint.textContent = 'Updating…';
            try {
                const r = await fetch('/api/trader/positionslope', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ positionSlope })
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                const ps = (data.positionSlope === null || data.positionSlope === undefined) ? null : Number(data.positionSlope);
                if (ps !== null && Number.isFinite(ps)) {
                    traderPositionSlopeHint.textContent = `Current positionSlope: ${ps}`;
                    showSuccess(`PositionSlope set to ${ps}`);
                } else {
                    traderPositionSlopeHint.textContent = 'Current positionSlope: (unset)';
                    showSuccess('PositionSlope unset');
                }
            } catch (e) {
                showError(`Failed to update PositionSlope: ${e.message}`);
                await refreshTraderState();
            }
        });

        traderBtcMacdCoeffApplyBtn.addEventListener('click', async () => {
            const raw = (traderBtcMacdCoeffInput.value || '').trim();
            if (!raw) {
                showError('BTC MACD coeff is required');
                return;
            }
            const btcMacdCoeff = Number(raw);
            if (!Number.isFinite(btcMacdCoeff)) {
                showError('Invalid BTC MACD coeff');
                return;
            }
            traderBtcMacdCoeffHint.textContent = 'Updating…';
            try {
                const r = await fetch('/api/trader/btcmacdcoeff', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ btcMacdCoeff })
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                const mc = (data.btcMacdCoeff === null || data.btcMacdCoeff === undefined) ? null : Number(data.btcMacdCoeff);
                if (mc !== null && Number.isFinite(mc)) {
                    traderBtcMacdCoeffHint.textContent = `Current BTC MACD coeff: ${mc}`;
                    showSuccess(`BTC MACD coeff set to ${mc}`);
                } else {
                    traderBtcMacdCoeffHint.textContent = 'Current BTC MACD coeff: (unset)';
                    showSuccess('BTC MACD coeff unset');
                }
            } catch (e) {
                showError(`Failed to update BTC MACD coeff: ${e.message}`);
                await refreshTraderState();
            }
        });

        refreshTraderState();

        function showError(message) {
            const alert = document.getElementById('errorAlert');
            alert.textContent = message;
            alert.classList.add('active');
            setTimeout(() => alert.classList.remove('active'), 5000);
        }

        function showSuccess(message) {
            const alert = document.getElementById('successAlert');
            alert.textContent = message;
            alert.classList.add('active');
            setTimeout(() => alert.classList.remove('active'), 3000);
        }
    </script>
</body>

</html>
